<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Primary Meta -->
    <title>HeartCare AI — Heart Disease Prediction</title>

    <meta name="theme-color" content="#7c3aed" />

    <!-- PWA / App Meta -->
    <meta name="application-name" content="HeartCare AI" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta name="msapplication-TileColor" content="#7c3aed" />
    <meta name="format-detection" content="telephone=no" />

    <meta property="og:type" content="website" />

    <meta name="twitter:image" content="/heart3d.png" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/heart3d.png" />
    <link rel="apple-touch-icon" href="/heart3d.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      rel="stylesheet"
    />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <style>
      html, body { height: 100%; margin: 0; }
      #root { height: 100%; }
      * { box-sizing: border-box; }
      /* Prevent FOUC */
      body { background: #000; }
      body.light-ready { background: #f5f7ff; }
    </style>
  </head>
  <body>
    <div id="root"></div>
